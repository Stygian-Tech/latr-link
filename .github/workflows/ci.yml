name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      deploy_gateway:
        description: Deploy latr-gateway to Fly after CI checks
        required: true
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      gateway_migrations: ${{ steps.filter.outputs.gateway_migrations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: bash scripts/ci-detect-changes.sh

  ci:
    name: Test and build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.14"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Run CI script
        run: bash scripts/ci.sh
        env:
          NEXT_PUBLIC_APP_ENV: test

  migrate-gateway-db:
    name: Migrate gateway database (Supabase)
    needs: [changes, ci]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      needs.changes.result == 'success' &&
      (
        needs.changes.outputs.gateway_migrations == 'true' ||
        (
          needs.changes.outputs.gateway == 'true' &&
          (
            (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev')) ||
            (github.event_name == 'workflow_dispatch' && inputs.deploy_gateway)
          )
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply developer console migration
        env:
          GATEWAY_DATABASE_URL_DEV: ${{ secrets.GATEWAY_DATABASE_URL_DEV }}
          GATEWAY_DATABASE_URL_PROD: ${{ secrets.GATEWAY_DATABASE_URL_PROD }}
        run: bash scripts/run-gateway-migration.sh "${{ github.ref_name }}"

  deploy-gateway:
    name: Deploy Gateway (Fly.io)
    needs: [changes, ci, migrate-gateway-db]
    if: |
      always() &&
      needs.ci.result == 'success' &&
      needs.changes.result == 'success' &&
      needs.migrate-gateway-db.result == 'success' &&
      needs.changes.outputs.gateway == 'true' &&
      (
        (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev')) ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_gateway)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy gateway to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          FLY_GATEWAY_APP_DEV: ${{ secrets.FLY_GATEWAY_APP_DEV }}
          FLY_GATEWAY_APP_PROD: ${{ secrets.FLY_GATEWAY_APP_PROD }}
        run: bash scripts/fly-deploy-gateway.sh "${{ github.ref_name }}"
