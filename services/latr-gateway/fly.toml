# fly.toml app configuration file generated for latr-link-prod-gateway on 2026-06-24T14:58:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'latr-link-prod-gateway'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  wait_timeout = '10m0s'

[env]
  APP_ENV = 'dev'
  OAUTH_LATRKIT_PUBLIC_ORIGIN = 'https://testing.latrkit.dev'
  OAUTH_PUBLIC_ORIGIN = 'https://testing.latr.link'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
