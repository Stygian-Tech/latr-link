<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>L@tr.link</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>L@tr.link</h1>
      <p class="subtitle">Save This Page to Your Library</p>
    </header>

    <section id="signed-out" class="panel hidden">
      <label for="handle">Bluesky Handle</label>
      <div class="row">
        <input id="handle" type="text" placeholder="@you.bsky.social" autocomplete="username" />
        <button id="sign-in" type="button">Sign In</button>
      </div>
      <p id="auth-error" class="error hidden" role="alert"></p>
    </section>

    <section id="signed-in" class="panel hidden">
      <p id="tab-url" class="url-preview"></p>
      <button id="save" type="button" class="primary">Save Current Tab</button>
      <p id="save-status" class="status" role="status"></p>
      <div class="footer">
        <a id="open-library" href="#" target="_blank" rel="noopener">Open Library</a>
        <button id="sign-out" type="button" class="link">Sign Out</button>
      </div>
    </section>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
